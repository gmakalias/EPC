# k8s/production/namespace.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: epc-production
  labels:
    environment: production
    app: epc

---
# k8s/production/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: epc-config
  namespace: epc-production
data:
  NODE_ENV: "production"
  PORT: "3000"
  ELASTICSEARCH_URL: "http://elasticsearch:9200"
  FRONTEND_URL: "https://epc.telco.gr"

---
# k8s/production/secrets.yaml
# NOTE: In production, use sealed-secrets or external secret management
apiVersion: v1
kind: Secret
metadata:
  name: epc-secrets
  namespace: epc-production
type: Opaque
stringData:
  database-url: "postgresql://epc_user:CHANGE_ME@postgres:5432/epc_prod"
  redis-url: "redis://:CHANGE_ME@redis:6379"
  rabbitmq-url: "amqp://epc_user:CHANGE_ME@rabbitmq:5672"
  jwt-secret: "CHANGE_ME_IN_PRODUCTION"
  jwt-refresh-secret: "CHANGE_ME_IN_PRODUCTION"

---
# k8s/production/deployment-backend.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: epc-api
  namespace: epc-production
  labels:
    app: epc-api
    tier: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: epc-api
  template:
    metadata:
      labels:
        app: epc-api
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: epc-api
        image: ghcr.io/your-org/epc-system/backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: epc-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: epc-config
              key: PORT
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: epc-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: epc-secrets
              key: redis-url
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: epc-secrets
              key: rabbitmq-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: epc-secrets
              key: jwt-secret
        - name: JWT_REFRESH_SECRET
          valueFrom:
            secretKeyRef:
              name: epc-secrets
              key: jwt-refresh-secret
        - name: ELASTICSEARCH_URL
          valueFrom:
            configMapKeyRef:
              name: epc-config
              key: ELASTICSEARCH_URL
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]
      terminationGracePeriodSeconds: 30

---
# k8s/production/deployment-frontend.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: epc-frontend
  namespace: epc-production
  labels:
    app: epc-frontend
    tier: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: epc-frontend
  template:
    metadata:
      labels:
        app: epc-frontend
        tier: frontend
    spec:
      containers:
      - name: epc-frontend
        image: ghcr.io/your-org/epc-system/frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5

---
# k8s/production/service-backend.yaml
apiVersion: v1
kind: Service
metadata:
  name: epc-api
  namespace: epc-production
  labels:
    app: epc-api
spec:
  type: ClusterIP
  selector:
    app: epc-api
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http

---
# k8s/production/service-frontend.yaml
apiVersion: v1
kind: Service
metadata:
  name: epc-frontend
  namespace: epc-production
  labels:
    app: epc-frontend
spec:
  type: ClusterIP
  selector:
    app: epc-frontend
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http

---
# k8s/production/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: epc-ingress
  namespace: epc-production
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - epc.telco.gr
    - api.epc.telco.gr
    secretName: epc-tls
  rules:
  - host: api.epc.telco.gr
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: epc-api
            port:
              number: 80
  - host: epc.telco.gr
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: epc-frontend
            port:
              number: 80

---
# k8s/production/hpa-backend.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: epc-api-hpa
  namespace: epc-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: epc-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max

---
# k8s/production/pdb.yaml
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: epc-api-pdb
  namespace: epc-production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: epc-api

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: epc-frontend-pdb
  namespace: epc-production
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: epc-frontend